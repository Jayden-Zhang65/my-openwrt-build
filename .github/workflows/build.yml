name: Build MosDNS for OpenWrt 21.02.7

on:
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache gettext libncurses5-dev libncursesw5-dev zlib1g-dev python3 python3-distutils swig tar wget unzip git expand-coreutils

      - name: Download SDK
        run: |
          # SDK URL for OpenWrt 21.02.7 ramips/mt7621
          SDK_URL="https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
          wget $SDK_URL
          tar xJf *.tar.xz
          mv openwrt-sdk-* sdk

      - name: Update Feeds & Add MosDNS
        run: |
          cd sdk
          # Update default feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # Add sbwml's mosdns feed
          git clone https://github.com/sbwml/luci-app-mosdns package/mosdns
          
          # Important: OpenWrt 21.02 has an old Go version. 
          # sbwml's repo usually handles dependency, but we force update golang feed
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang feeds/packages/lang/golang
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile
        run: |
          cd sdk
          # Select the package
          make defconfig
          # We force select luci-app-mosdns
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_mosdns=y" >> .config
          make defconfig
          
          # Compile (using -j1 for higher success rate on dependencies, or -j$(nproc) for speed)
          make package/mosdns/compile V=s

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mosdns-openwrt-21.02.7
          path: sdk/bin/packages/mipsel_24kc/base/*.ipk
