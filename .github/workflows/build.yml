name: Build MosDNS for OpenWrt 21.02.7

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync

      - name: Download and Extract SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
          wget -q $SDK_URL -O sdk.tar.xz
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1

      - name: Update Feeds
        run: |
          cd sdk
          # Add sbwml mosdns feed
          echo "src-git mosdns_feed https://github.com/sbwml/luci-app-mosdns" >> feeds.conf.default
          
          ./scripts/feeds update -a
          
          # Replace Go with modern version (Required for MosDNS v5)
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang feeds/packages/lang/golang
          
          ./scripts/feeds install -a

      - name: Configure and Compile
        run: |
          cd sdk
          # Force select everything needed
          echo "CONFIG_PACKAGE_mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-mosdns-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_v2ray-geodata=y" >> .config
          
          make defconfig
          
          # Step 1: Compile Golang (Host tools) first - This is the most common point of failure
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          
          # Step 2: Compile the actual MosDNS package
          # Using -j1 for the final step to get a clear error log if it fails again
          make package/feeds/mosdns_feed/mosdns/compile V=s -j$(nproc)
          make package/feeds/mosdns_feed/luci-app-mosdns/compile V=s -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mosdns-openwrt-21.02.7-mt7621
          path: |
            sdk/bin/packages/mipsel_24kc/mosdns/*.ipk
            sdk/bin/packages/mipsel_24kc/base/mosdns*.ipk
            sdk/bin/packages/mipsel_24kc/luci/luci-app-mosdns*.ipk
            sdk/bin/packages/mipsel_24kc/luci/luci-i18n-mosdns-zh-cn*.ipk
            sdk/bin/packages/mipsel_24kc/base/v2ray-geodata*.ipk
