name: Build MosDNS for OpenWrt 21.02.7

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync upx-ucl

      - name: Download and Extract SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
          wget -q $SDK_URL -O sdk.tar.xz
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1

      - name: Clone Source Code & Apply Fixes
        run: |
          cd sdk
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 1. Use 24.x Golang (Guaranteed to successfully build on OpenWrt 21.02)
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang -b 24.x feeds/packages/lang/golang
          
          # 2. Get Geodata
          rm -rf feeds/packages/net/v2ray-geodata
          git clone https://github.com/sbwml/v2ray-geodata package/v2ray-geodata
          
          # 3. Clone MosDNS
          git clone https://github.com/sbwml/luci-app-mosdns -b v5 package/mosdns
          
          # =========================================================================
          # THE MAGIC FIX: Inject an OpenWrt Hook to edit the source code on-the-fly
          # This downgrades the 'go 1.25.0' requirement in go.mod to 'go 1.23.0' 
          # so the 24.x compiler accepts it without crashing.
          # =========================================================================
          cat << 'EOF' >> package/mosdns/mosdns/Makefile
          
          define Build/Prepare/Post
          	sed -i -E "s/^go .+/go 1.23.0/" $(PKG_BUILD_DIR)/go.mod
          endef
          Hooks/Prepare/Post += Build/Prepare/Post
          EOF
          
          # 4. Prevent the ancient 'strip' tool from breaking the modern Go binary
          echo "STRIP:=true" >> package/mosdns/mosdns/Makefile
          
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and Compile
        run: |
          cd sdk
          
          # Setup configuration
          echo "CONFIG_PACKAGE_mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_luci-i18n-mosdns-zh-cn=y" >> .config
          echo "CONFIG_PACKAGE_v2ray-geodata=y" >> .config
          
          # Explicitly disable UPX compression via config
          echo "# CONFIG_PACKAGE_mosdns_compress_upx is not set" >> .config
          echo "CONFIG_PACKAGE_mosdns_compress_none=y" >> .config
          
          # Global safety flags
          export GOPROXY=https://proxy.golang.org,direct
          export GOMAXPROCS=1
          
          make defconfig
          
          # Step 1: Compile Golang Host Tool
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          
          # Step 2: Compile Geodata
          make package/v2ray-geodata/compile V=s -j$(nproc)
          
          # Step 3: Compile MosDNS
          make package/mosdns/mosdns/compile V=s -j1
          
          # Step 4: Compile LuCI UI
          make package/mosdns/luci-app-mosdns/compile V=s -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mosdns-openwrt-21.02.7-mt7621
          path: |
            sdk/bin/packages/mipsel_24kc/*/mosdns*.ipk
            sdk/bin/packages/mipsel_24kc/*/luci-app-mosdns*.ipk
            sdk/bin/packages/mipsel_24kc/*/luci-i18n-mosdns-zh-cn*.ipk
            sdk/bin/packages/mipsel_24kc/*/v2ray-geodata*.ipk
