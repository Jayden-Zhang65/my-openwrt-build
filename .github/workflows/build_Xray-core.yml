name: Build Xray 1.8.24 for MT7621 (21.02.7)

on:
  workflow_dispatch:

env:
  SDK_URL: "https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
  # 1.8.24 fixes the "unknown router rule type" compatibility issue found in 1.8.4
  XRAY_VER: "1.8.24"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync ccache

      - name: Download and Prepare SDK
        run: |
          wget -qO sdk.tar.xz $SDK_URL
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
          ./scripts/feeds update -a

      - name: Fix Golang & Dependencies
        run: |
          cd sdk
          # Use modern Go (Required for Xray 1.8.x)
          rm -rf feeds/packages/lang/golang
          git clone https://github.com/sbwml/packages_lang_golang feeds/packages/lang/golang
          
          # Fix the ca-bundle/ca-certificates dependency issue
          XRAY_DIR="feeds/passwall_packages/xray-core"
          sed -i 's/+ca-bundle//g' $XRAY_DIR/Makefile
          sed -i 's/+ca-certificates//g' $XRAY_DIR/Makefile
          
          # Set Version to 1.8.24
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ env.XRAY_VER }}/g" $XRAY_DIR/Makefile
          sed -i 's/PKG_HASH:=.*/PKG_HASH:=skip/g' $XRAY_DIR/Makefile
          
          # Ensure UPX is disabled for MIPS stability
          sed -i '/upx/d' $XRAY_DIR/Makefile 2>/dev/null || true
          
          # Remove official conflict and install
          rm -rf feeds/packages/net/xray-core
          ./scripts/feeds install -a

      - name: Compile Xray-core
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          
          # Build Go host tool
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          
          # Build Xray-core with softfloat for MT7621
          make package/feeds/passwall_packages/xray-core/compile V=s -j$(nproc) \
            GO_PKG_VARS="GOMIPS=softfloat"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-core-1.8.24-mt7621
          path: sdk/bin/packages/mipsel_24kc/*/xray-core*.ipk
