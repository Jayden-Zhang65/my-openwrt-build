name: Build xray-core (Passwall) for MT7621 (OpenWrt 21.02.7)

on:
  workflow_dispatch:

env:
  SDK_URL: "https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
  # LuCI 25.8.x expects current Xray (e.g. stream network "raw", ≥ v24.9.30). Version is taken from
  # openwrt-passwall-packages xray-core/Makefile (PKG_VERSION / PKG_HASH) — do not override to 1.x.
  PASSWALL_PACKAGES_REPO: "https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git"
  # Branch or commit SHA (feeds.conf src-git accepts both). Pin a commit for reproducible builds.
  PASSWALL_PACKAGES_REF: "main"
  # Xray 26.x requires Go 1.26 (see XTLS/Xray-core go.mod). sbwml 26.x provides it; 21.x Go is too old.
  SBWML_GOLANG_BRANCH: "26.x"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync ccache

      - name: Download and Prepare SDK
        run: |
          wget -qO sdk.tar.xz "$SDK_URL"
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          echo "src-git passwall_packages ${{ env.PASSWALL_PACKAGES_REPO }};${{ env.PASSWALL_PACKAGES_REF }}" >> feeds.conf.default
          ./scripts/feeds update -a

      - name: Replace golang feed and de-duplicate xray-core
        run: |
          cd sdk
          rm -rf feeds/packages/lang/golang
          git clone --depth 1 -b "${{ env.SBWML_GOLANG_BRANCH }}" \
            https://github.com/sbwml/packages_lang_golang.git feeds/packages/lang/golang

          rm -rf feeds/packages/net/xray-core

          # SDK image has no ca-bundle package source; drop the dep so the ipkg can install.
          sed -i 's/+ca-bundle//g' feeds/passwall_packages/xray-core/Makefile
          sed -i 's/+ca-certificates//g' feeds/passwall_packages/xray-core/Makefile

          ./scripts/feeds install -a
          ln -sf ../feeds/passwall_packages/xray-core package/xray-core

      - name: Show pinned Xray version
        run: |
          grep -E '^PKG_(VERSION|HASH):=' sdk/feeds/passwall_packages/xray-core/Makefile || true

      - name: Compile xray-core
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          export GOPROXY=https://proxy.golang.org,direct
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          # Do not pass GO_PKG_VARS= on the command line (breaks golang-package.mk env → "No binaries were built").
          make package/xray-core/compile V=s -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-core-openwrt-21.02.7-mt7621-passwall-packages
          path: sdk/bin/packages/mipsel_24kc/*/xray-core*.ipk
