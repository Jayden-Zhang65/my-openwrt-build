name: Build Xray 1.8.24 for MT7621

on:
  workflow_dispatch:

env:
  SDK_URL: "https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
  XRAY_VER: "1.8.24"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync ccache

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download and Prepare SDK
        run: |
          wget -qO sdk.tar.xz $SDK_URL
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          # 1. Add Passwall feed
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
          ./scripts/feeds update -a
          
          # 2. Delete official xray-core to prevent conflict
          rm -rf feeds/packages/net/xray-core

      - name: Fix Golang & Xray Makefile
        run: |
          cd sdk
          # 1. Use the Go 1.22 branch (Prevents Go 1.23 linker errors)
          rm -rf feeds/packages/lang/golang
          git clone -b 22.x https://github.com/sbwml/packages_lang_golang feeds/packages/lang/golang
          
          # 2. Modify the Makefile in the FEED folder before installing
          XRAY_MAKEFILE="feeds/passwall_packages/xray-core/Makefile"
          
          # Remove ca-bundle (Fixes "No rule to make target")
          sed -i 's/+ca-bundle//g' $XRAY_MAKEFILE
          sed -i 's/+ca-certificates//g' $XRAY_MAKEFILE
          
          # Update Version to 1.8.24
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ env.XRAY_VER }}/g" $XRAY_MAKEFILE
          sed -i 's/PKG_HASH:=.*/PKG_HASH:=skip/g' $XRAY_MAKEFILE
          
          # Disable UPX and force softfloat settings inside Makefile
          sed -i '/upx/d' $XRAY_MAKEFILE
          
          # 3. Now install the fixed feed
          ./scripts/feeds install -a

      - name: Compile Xray-core
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          
          export GOPROXY=https://proxy.golang.org,direct
          
          # Build the Go compiler (Host)
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          
          # Build Xray-core
          # Using the feed-based path is the correct way for 21.02 SDK
          make package/feeds/passwall_packages/xray-core/compile V=s -j$(nproc) \
            GO_PKG_VARS="GOMIPS=softfloat"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-core-1.8.24-mt7621
          path: sdk/bin/packages/mipsel_24kc/*/xray-core*.ipk
