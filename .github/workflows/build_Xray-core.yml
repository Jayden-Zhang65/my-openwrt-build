name: Build Xray 1.8.24 for MT7621

on:
  workflow_dispatch:

env:
  SDK_URL: "https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
  XRAY_VER: "1.8.24"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync ccache

      - name: Setup Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download and Prepare SDK
        run: |
          wget -qO sdk.tar.xz $SDK_URL
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          # Add the Passwall feed
          echo "src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main" >> feeds.conf.default
          ./scripts/feeds update -a

      - name: Fix Golang & Dependencies
        run: |
          cd sdk
          # 1. Use the sbwml Go feed (Go 1.22 branch to avoid linker bugs)
          rm -rf feeds/packages/lang/golang
          git clone -b 22.x https://github.com/sbwml/packages_lang_golang feeds/packages/lang/golang
          
          # 2. Remove official conflict
          rm -rf feeds/packages/net/xray-core
          
          # 3. FIX: Strip ca-bundle (Fixes "No rule to make target")
          XRAY_DIR="feeds/passwall_packages/xray-core"
          sed -i 's/+ca-bundle//g' $XRAY_DIR/Makefile
          sed -i 's/+ca-certificates//g' $XRAY_DIR/Makefile
          
          # 4. Install feeds
          ./scripts/feeds install -a
          
          # 5. FORCE SYMLINK (Your functional method)
          ln -sf ../feeds/passwall_packages/xray-core package/xray-core

      - name: Patch Xray Makefile for 1.8.24
        run: |
          cd sdk/package/xray-core
          # Update version and skip hash
          sed -i "s/PKG_VERSION:=.*/PKG_VERSION:=${{ env.XRAY_VER }}/g" Makefile
          sed -i 's/PKG_HASH:=.*/PKG_HASH:=skip/g' Makefile
          
          # Disable UPX (Stability for MT7621)
          sed -i '/upx/d' Makefile 2>/dev/null || true
          
          # FIX: "No binaries were built" 
          # We force the Go installer to be more aggressive in finding the binary
          echo "GO_PKG_INSTALL_ALL:=1" >> Makefile

      - name: Compile Xray-core
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_xray-core=y" >> .config
          
          # Use Proxy to ensure modules download correctly
          export GOPROXY=https://proxy.golang.org,direct
          
          # Step 1: Build the Go compiler (Host)
          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          
          # Step 2: Build Xray-core with Softfloat for MT7621
          # We include the GOMIPS variable here to be 100% sure
          make package/xray-core/compile V=s -j$(nproc) \
            GO_PKG_VARS="GOMIPS=softfloat" \
            GO_PKG_BUILD_VARS="GOMIPS=softfloat"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xray-core-1.8.24-mt7621
          path: sdk/bin/packages/mipsel_24kc/*/xray-core*.ipk
