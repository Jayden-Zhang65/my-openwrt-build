name: Build sing-box (Passwall) for MT7621 (OpenWrt 21.02.7)

on:
  workflow_dispatch:

env:
  SDK_URL: "https://downloads.openwrt.org/releases/21.02.7/targets/ramips/mt7621/openwrt-sdk-21.02.7-ramips-mt7621_gcc-8.4.0_musl.Linux-x86_64.tar.xz"
  PASSWALL_PACKAGES_REPO: "https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git"
  PASSWALL_PACKAGES_REF: "main"
  SBWML_GOLANG_BRANCH: "26.x"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools swig zlib1g-dev wget unzip rsync ccache

      - name: Download and Prepare SDK
        run: |
          wget -qO sdk.tar.xz "$SDK_URL"
          mkdir sdk
          tar -xJf sdk.tar.xz -C sdk --strip-components=1
          cd sdk
          echo "src-git passwall_packages ${{ env.PASSWALL_PACKAGES_REPO }};${{ env.PASSWALL_PACKAGES_REF }}" >> feeds.conf.default
          ./scripts/feeds update -a

      - name: Replace golang feed and prepare sing-box
        run: |
          cd sdk
          rm -rf feeds/packages/lang/golang
          git clone --depth 1 -b "${{ env.SBWML_GOLANG_BRANCH }}" \
            https://github.com/sbwml/packages_lang_golang.git feeds/packages/lang/golang

          rm -rf feeds/packages/net/sing-box

          # 去掉ca-bundle依赖（SDK镜像中缺少该包源）
          sed -i 's/+ca-bundle//g' feeds/passwall_packages/sing-box/Makefile
          sed -i 's/+ca-certificates//g' feeds/passwall_packages/sing-box/Makefile

          # 关键修复：强制禁用 CGO，避免 mips16 + runtime/cgo 汇编错误
          sed -i '/GO_PKG_LDFLAGS_X/a GO_PKG_CGO_ENABLED:=0' feeds/passwall_packages/sing-box/Makefile

          ./scripts/feeds install -a
          ln -sf ../feeds/passwall_packages/sing-box package/sing-box

      - name: Show pinned sing-box version
        run: |
          grep -E '^PKG_(VERSION|HASH):=' sdk/feeds/passwall_packages/sing-box/Makefile || true

      - name: Configure
        run: |
          cd sdk
          make defconfig
          echo "CONFIG_PACKAGE_sing-box=y" >> .config
          echo "CONFIG_SING_BOX_BUILD_ACME=y" >> .config
          echo "CONFIG_SING_BOX_BUILD_CLASH_API=y" >> .config
          echo "CONFIG_SING_BOX_BUILD_QUIC=y" >> .config
          echo "CONFIG_SING_BOX_BUILD_UTLS=y" >> .config
          echo "# CONFIG_SING_BOX_BUILD_GVISOR is not set" >> .config
          echo "# CONFIG_SING_BOX_BUILD_TAILSCALE is not set" >> .config
          echo "# CONFIG_SING_BOX_BUILD_WIREGUARD is not set" >> .config

      - name: Compile sing-box
        run: |
          cd sdk
          set -o pipefail
          export GOPROXY=https://proxy.golang.org,direct

          # 强制在 golang-package.mk 中将 CGO_ENABLED 改为 0
          sed -i 's/CGO_ENABLED=1/CGO_ENABLED=0/' feeds/packages/lang/golang/golang-package.mk

          # 同时移除 -linkmode external（禁用 CGO 后不需要外部链接）
          sed -i 's/-linkmode external//' feeds/packages/lang/golang/golang-package.mk
          sed -i "s/-extldflags '[^']*'//" feeds/packages/lang/golang/golang-package.mk

          make package/feeds/packages/golang/host/compile V=s -j$(nproc)
          make package/sing-box/compile V=s -j$(nproc) 2>&1 | tee /tmp/sing-box-build.log

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-openwrt-21.02.7-mt7621-passwall-packages
          path: sdk/bin/packages/mipsel_24kc/*/sing-box*.ipk

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-build-log
          path: /tmp/sing-box-build.log
